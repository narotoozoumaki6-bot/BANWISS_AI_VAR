<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BANWISS AI VAR | Professional Edition</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; overflow: hidden; touch-action: none; }
        #video-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .controls { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; gap: 12px; z-index: 1000; padding: 10px; }
        button { 
            background: rgba(220, 20, 60, 0.9); border: 2px solid #fff; color: white; padding: 15px; border-radius: 15px; 
            font-weight: bold; font-size: 14px; min-width: 100px; -webkit-touch-callout: none; user-select: none;
        }
        button:active { background: #fff; color: #dc143c; }
        .label { position: absolute; top: -20px; width: 100%; text-align: center; font-size: 10px; color: #ccc; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" autoplay playsinline muted></video>
</div>

<div class="controls">
    <button id="cameraBtn">📷 الكاميرا</button>
    
    <button id="slowBtn">
        <div class="label">درجات الإبطاء</div>
        ⏳ إبطاء (مطول)
    </button>
    
    <button id="replayBtn">
        <div class="label">إعادة اللقطة</div>
        🔄 إعادة (مطول)
    </button>
</div>

<script>
    const video = document.getElementById('video');
    let replayPoint = 0;

    // 1. تشغيل الكاميرا الخلفية فوراً
    document.getElementById('cameraBtn').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
        } catch (err) {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        }
    };

    // 2. ميزة "درجات الإبطاء" بالضغط المطول
    const slowBtn = document.getElementById('slowBtn');
    slowBtn.onmousedown = slowBtn.ontouchstart = (e) => {
        e.preventDefault();
        video.playbackRate = 0.25; // الدرجة التي اخترتها للإبطاء الشديد
    };
    slowBtn.onmouseup = slowBtn.ontouchend = () => {
        video.playbackRate = 1.0;
    };

    // 3. ميزة "إعادة اللقطة" المستعادة (Loop) بالضغط المطول
    const replayBtn = document.getElementById('replayBtn');
    let isReplaying = false;

    replayBtn.onmousedown = replayBtn.ontouchstart = (e) => {
        e.preventDefault();
        replayPoint = video.currentTime; // تسجيل لحظة بداية الإعادة
        isReplaying = true;
        video.loop = true; // تفعيل ميزة الإعادة المستمرة للقطة
    };

    replayBtn.onmouseup = replayBtn.ontouchend = () => {
        // إذا أردت أن يتوقف التكرار عند رفع الإصبع، اترك الكود هكذا
        // أما إذا أردت استمرار التكرار للأبد، يمكننا تعديله
        video.loop = false;
        isReplaying = false;
    };

    // منع ظهور القوائم المزعجة للهاتف
    window.oncontextmenu = (e) => { e.preventDefault(); };
</script>
</body>
</html>
