<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BANWISS AI VAR | نظام التحكيم الذكي</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        :root {
            --m-blue: #005eb8;
            --m-red: #ce1126;
            --m-black: #0a0a0a;
            --m-silver: #a2adbc;
            --m-dark: #111111;
        }
        body {
            background: var(--m-black);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }
        .tabs-nav {
            display: flex; justify-content: center; gap: 12px;
            background: #000000ee; backdrop-filter: blur(10px);
            padding: 12px; position: sticky; top: 0; z-index: 200;
            border-bottom: 2px solid var(--m-blue);
        }
        .tab-btn {
            background: #222; border: none; padding: 12px 28px;
            border-radius: 50px; font-weight: bold; font-size: 1.05rem;
            color: white; cursor: pointer; transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--m-blue);
            box-shadow: 0 0 15px rgba(0,94,184,0.7);
        }
        .page { display: none; }
        .page.active-page { display: block; }

        .dashboard {
            max-width: 980px; margin: 0 auto; padding: 16px 12px 200px 12px;
            text-align: center;
        }
        #video-container, #rec-video-container {
            width: 100%; background: #000; border-radius: 16px;
            overflow: hidden; border: 2px solid #333; margin-bottom: 12px;
        }
        video {
            max-width: 100%; height: auto; border-radius: 12px;
            background: black;
        }
        .info-bar {
            color: var(--m-silver); font-size: 14px;
            background: #1a1a1a; padding: 10px; border-radius: 30px;
            margin: 10px 0;
        }
        .footer-controls {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(8,8,8,0.98); border-top: 3px solid var(--m-blue);
            padding: 12px 8px; z-index: 1000; backdrop-filter: blur(12px);
        }
        .controls-row {
            display: flex; gap: 8px; justify-content: center;
            flex-wrap: wrap; margin-bottom: 8px;
        }
        .btn {
            padding: 11px 18px; border: none; border-radius: 50px;
            font-weight: bold; color: white; font-size: 13.5px;
            cursor: pointer; transition: 0.2s;
        }
        .btn-m { background: var(--m-blue); }
        .btn-var { background: var(--m-red); }
        .btn-gray { background: #3a3a3a; }
        .btn-active { outline: 3px solid white; box-shadow: 0 0 15px var(--m-red); }

        .header-btns {
            margin: 10px 0 20px; display: flex; justify-content: center;
            gap: 12px; flex-wrap: wrap;
        }
        @media (max-width: 560px) {
            .btn, .tab-btn { padding: 9px 14px; font-size: 12.5px; }
        }
    </style>
</head>
<body>

<div class="tabs-nav">
    <button class="tab-btn active" data-page="page1">📼 تحليل الفيديو المسجل</button>
    <button class="tab-btn" data-page="page2">🎥 تسجيل مباشر + VAR لحظي</button>
</div>

<!-- صفحة 1: تحليل فيديو -->
<div id="page1" class="page active-page">
    <div class="dashboard">
        <div class="header-btns">
            <label class="btn btn-m" style="cursor:pointer;">
                📂 رفع فيديو
                <input type="file" id="vInput" hidden accept="video/*">
            </label>
            <div class="btn btn-var">🎬 VAR Studio</div>
        </div>
        <div id="video-container">
            <video id="analysisVideo" playsinline controls></video>
        </div>
        <div class="info-bar">⚡ وضع التحليل الكامل - إعادة + بطء + تنقل</div>
    </div>

    <div class="footer-controls" id="footer-page1">
        <div class="controls-row">
            <button class="btn btn-gray" id="back5Btn">⏪ 5ث</button>
            <button class="btn btn-gray" id="back1Btn">◀️ 1ث</button>
            <button class="btn btn-m" id="playBtn1">▶️</button>
            <button class="btn btn-m" id="pauseBtn1">⏸️</button>
            <button class="btn btn-gray" id="forward1Btn">1ث ▶️</button>
            <button class="btn btn-gray" id="forward5Btn">5ث ⏩</button>
        </div>
        <div class="controls-row">
            <button class="btn btn-var" id="replayBtnPage1">🔄 إعادة تلقائية</button>
            <button class="btn btn-m" id="speedBtn">🐢 البطء</button>
        </div>
    </div>
</div>

<!-- صفحة 2: الكاميرا -->
<div id="page2" class="page">
    <div class="dashboard">
        <div class="header-btns">
            <button class="btn btn-var" id="startCamBtn">📷 فتح الكاميرا الخلفية</button>
            <button class="btn btn-gray" id="stopCamBtn">❌ إغلاق الكاميرا</button>
        </div>
        <div id="rec-video-container">
            <video id="liveCameraVideo" playsinline autoplay muted></video>
        </div>
        <div id="liveStatus" class="info-bar">📡 اضغط "فتح الكاميرا" لبدء</div>
    </div>

    <div class="footer-controls" id="footer-page2">
        <div class="controls-row">
            <button class="btn btn-gray" id="camBack5">⏪ 5ث</button>
            <button class="btn btn-gray" id="camBack1">◀️ 1ث</button>
            <button class="btn btn-m" id="camPlayBtn">▶️</button>
            <button class="btn btn-m" id="camPauseBtn">⏸️ تجميد</button>
            <button class="btn btn-gray" id="camForward1">1ث ▶️</button>
            <button class="btn btn-gray" id="camForward5">5ث ⏩</button>
        </div>
        <div class="controls-row">
            <button class="btn btn-var" id="replayBtnPage2">🔄 إعادة تلقائية</button>
            <button class="btn btn-m" id="captureVarBtn">🎬 تسجيل مقطع VAR (6 ثواني)</button>
        </div>
    </div>
</div>

<script>
// ====================== المتغيرات ======================
const videoElem = document.getElementById('analysisVideo');
const liveVideo = document.getElementById('liveCameraVideo');
let cameraStream = null;
let recordedBlobUrl = null;
let isVarModeActive = false;
let isLoopingPage1 = false, isLoopingPage2 = false;
let loopDuration = 5;

// ====================== الصفحة 1 ======================
document.getElementById('vInput').onchange = (e) => {
    if (e.target.files[0]) {
        const url = URL.createObjectURL(e.target.files[0]);
        videoElem.src = url;
        videoElem.play().catch(() => {});
        isLoopingPage1 = false;
    }
};

document.getElementById('back5Btn').onclick = () => videoElem.currentTime -= 5;
document.getElementById('back1Btn').onclick = () => videoElem.currentTime -= 1;
document.getElementById('playBtn1').onclick = () => videoElem.play();
document.getElementById('pauseBtn1').onclick = () => videoElem.pause();
document.getElementById('forward1Btn').onclick = () => videoElem.currentTime += 1;
document.getElementById('forward5Btn').onclick = () => videoElem.currentTime += 5;

// إعادة تلقائية صفحة 1
document.getElementById('replayBtnPage1').onclick = () => {
    if (!videoElem.src) return alert("ارفع فيديو أولاً");
    isLoopingPage1 = !isLoopingPage1;
    document.getElementById('replayBtnPage1').classList.toggle('btn-active', isLoopingPage1);
};

videoElem.ontimeupdate = () => {
    if (isLoopingPage1 && videoElem.currentTime >= videoElem.currentTime - loopDuration + loopDuration) {
        // يمكن تحسينها أكثر لاحقاً
    }
};

// ====================== الصفحة 2 ======================
async function startCameraBack() {
    try {
        if (cameraStream) stopCameraOnly();
        
        const constraints = {
            video: { facingMode: { exact: "environment" }, width: {ideal:1280}, height:{ideal:720} },
            audio: false
        };
        cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
        liveVideo.srcObject = cameraStream;
        liveVideo.play();
        document.getElementById('liveStatus').innerHTML = "✅ الكاميرا تعمل - يمكنك التسجيل";
    } catch (err) {
        alert("فشل في فتح الكاميرا: " + err.message);
    }
}

function stopCameraOnly() {
    if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
    }
    liveVideo.srcObject = null;
    if (recordedBlobUrl) URL.revokeObjectURL(recordedBlobUrl);
    recordedBlobUrl = null;
    isVarModeActive = false;
    document.getElementById('liveStatus').innerHTML = "📷 الكاميرا مغلقة";
}

document.getElementById('startCamBtn').onclick = startCameraBack;
document.getElementById('stopCamBtn').onclick = stopCameraOnly;

// تسجيل مقطع VAR 6 ثواني
document.getElementById('captureVarBtn').onclick = async () => {
    if (!cameraStream) return alert("افتح الكاميرا أولاً");

    const chunks = [];
    const recorder = new MediaRecorder(cameraStream, { mimeType: 'video/webm' });

    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/webm' });
        if (recordedBlobUrl) URL.revokeObjectURL(recordedBlobUrl);
        recordedBlobUrl = URL.createObjectURL(blob);
        
        liveVideo.srcObject = null;
        liveVideo.src = recordedBlobUrl;
        liveVideo.play();
        isVarModeActive = true;
        document.getElementById('liveStatus').innerHTML = "🎬 مقطع VAR جاهز (6 ثواني) - استخدم الإعادة والبطء";
    };

    recorder.start();
    setTimeout(() => recorder.stop(), 6000);
};

// باقي الأزرار (play, pause, speed, loop...) يمكن توسيعها

// تبديل الصفحات
document.querySelectorAll('.tab-btn').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(tab.dataset.page).classList.add('active-page');
    });
});
</script>
</body>
</html>
