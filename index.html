<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <title>BANWISS AI VAR | M5 Pro Control</title>
    <style>
        :root { 
            --m-blue: #005eb8; 
            --m-red: #ce1126; 
            --m-black: #000; 
            --m-silver: #a2adbc; 
        }
        body { 
            background: var(--m-black); 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            padding-bottom: 130px; 
            overflow-x: hidden;
        }
        
        .tab { 
            display: none; 
        }
        .tab.active { 
            display: block; 
        }

        .dashboard, .camera-page { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 10px; 
        }

        video { 
            width: 100%; 
            max-height: 70vh; 
            border-radius: 8px; 
            background: #111; 
        }

        .fixed-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(20, 20, 20, 0.97);
            border-top: 2px solid var(--m-blue);
            padding: 12px 8px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .controls-row { 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            flex-wrap: wrap; 
            width: 100%; 
        }
        
        .btn { 
            padding: 12px 16px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            color: white; 
            font-size: 14px; 
        }
        .btn-m { background: var(--m-blue); }
        .btn-var { background: var(--m-red); }
        .btn-active { box-shadow: 0 0 15px var(--m-red); border: 2px solid white; }

        /* زر التصوير الدائري الأحمر */
        #recordBtn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: var(--m-red);
            border: 6px solid #fff;
            box-shadow: 0 0 20px rgba(206, 17, 38, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            transition: all 0.2s;
        }
        #recordBtn.recording {
            background: #ff4444;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }

        .thumbnail-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            width: 100%;
            background: rgba(0,0,0,0.6);
            border-radius: 8px;
        }
        .thumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid #555;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* Gallery Modal */
        #galleryModal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            z-index: 10000;
        }
        .gallery-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            padding: 15px;
            overflow-y: auto;
            flex: 1;
        }
        .gallery-item {
            position: relative;
        }
        .gallery-item video {
            width: 100%;
            border-radius: 8px;
        }
        .close-gallery {
            font-size: 28px;
            cursor: pointer;
            padding: 5px 15px;
        }

        .seconds-menu { display: none; background: #222; padding: 10px; border-radius: 8px; gap: 8px; }
        .upload-btn { background: #333; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<!-- تبويب الـ Upload + Replay -->
<div id="uploadTab" class="tab active dashboard">
    <div style="text-align:center; padding: 10px;">
        <label class="upload-btn">📁 ارفع الفيديو <input type="file" id="vUpload" hidden accept="video/*"></label>
    </div>
    <video id="m5Video" playsinline controls></video>
    <div id="chat" style="font-size: 12px; color: var(--m-silver); text-align: center; margin-top: 10px;">
        نظام BANWISS AI VAR جاهز..
    </div>
</div>

<!-- صفحة التصوير المباشر -->
<div id="cameraTab" class="tab camera-page">
    <video id="liveVideo" autoplay playsinline muted style="background:#000;"></video>

    <div class="thumbnail-bar" id="thumbnailBar"></div>
</div>

<!-- Fixed Footer مشترك -->
<div class="fixed-footer">
    <!-- أزرار التبويب -->
    <div class="controls-row" style="margin-bottom:8px;">
        <button class="btn btn-m" onclick="switchTab(1)">📤 رفع فيديو</button>
        <button class="btn btn-m" onclick="switchTab(2)">📹 تصوير مباشر</button>
    </div>

    <!-- أزرار صفحة التصوير -->
    <div id="cameraControls" style="display:none; width:100%; text-align:center;">
        <button id="recordBtn" onclick="toggleRecording()">●</button>
        
        <div class="controls-row" style="margin-top:12px;">
            <button class="btn btn-var" id="replayLiveBtn">🔄 إعادة اللقطة</button>
            <button class="btn btn-m" onclick="setSlowMotion(0.5)">🐢 بطيء</button>
            <button class="btn btn-m" onclick="setSlowMotion(1)">🏎️ عادي</button>
        </div>
    </div>

    <!-- أزرار صفحة الرفع (القديمة) -->
    <div id="uploadControls" class="controls-row">
        <button class="btn btn-m" onclick="document.getElementById('m5Video').play()">▶️</button>
        <button class="btn btn-m" onclick="document.getElementById('m5Video').pause()">⏸️</button>
        <button class="btn btn-var" id="replayBtn">🔄 اعادة اللقطة</button>
        <button class="btn btn-m" onclick="document.getElementById('m5Video').playbackRate = 0.5">🐢 بطيء</button>
        <button class="btn btn-m" onclick="document.getElementById('m5Video').playbackRate = 1">🏎️ عادي</button>
    </div>
</div>

<!-- Gallery Modal -->
<div id="galleryModal">
    <div class="gallery-header">
        <h3>الفيديوهات المسجلة</h3>
        <span class="close-gallery" onclick="closeGallery()">✕</span>
    </div>
    <div class="gallery-grid" id="galleryGrid"></div>
</div>

<script>
// ==================== متغيرات عامة ====================
let currentTab = 1;
let mediaStream = null;
let mediaRecorder = null;
let recordedChunks = [];
let recordedVideos = []; // لتخزين الـ Blobs + URLs

const liveVideo = document.getElementById('liveVideo');
const recordBtn = document.getElementById('recordBtn');
const thumbnailBar = document.getElementById('thumbnailBar');
const galleryModal = document.getElementById('galleryModal');
const galleryGrid = document.getElementById('galleryGrid');

// تبديل التبويبات
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(tab === 1 ? 'uploadTab' : 'cameraTab').classList.add('active');
    
    document.getElementById('uploadControls').style.display = tab === 1 ? 'flex' : 'none';
    document.getElementById('cameraControls').style.display = tab === 2 ? 'block' : 'none';

    if (tab === 2) startCamera();
    else stopCamera();
}

// ==================== كاميرا + تسجيل ====================
async function startCamera() {
    try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" }, 
            audio: true 
        });
        liveVideo.srcObject = mediaStream;
    } catch (err) {
        alert("فشل في الوصول إلى الكاميرا: " + err.message);
    }
}

function stopCamera() {
    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
    }
    liveVideo.srcObject = null;
}

function toggleRecording() {
    if (!mediaRecorder || mediaRecorder.state === "inactive") {
        // بدء التسجيل
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'video/webm;codecs=vp9' });
        
        mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            
            recordedVideos.push({ url, blob });
            addThumbnail(url);
        };

        mediaRecorder.start();
        recordBtn.classList.add('recording');
        recordBtn.textContent = "■";
        
    } else {
        // إيقاف التسجيل
        mediaRecorder.stop();
        recordBtn.classList.remove('recording');
        recordBtn.textContent = "●";
    }
}

// إضافة ثمبنيل في الشريط السفلي
function addThumbnail(videoUrl) {
    const thumb = document.createElement('img');
    thumb.className = 'thumb';
    thumb.src = 'https://via.placeholder.com/60x60/222/fff?text=Video'; // يمكن تحسينه باستخدام canvas لأخذ لقطة
    
    thumb.onclick = () => showGallery();
    thumbnailBar.appendChild(thumb);
}

// ==================== Gallery ====================
function showGallery() {
    galleryGrid.innerHTML = '';
    
    recordedVideos.forEach((vid, index) => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.innerHTML = `
            <video src="${vid.url}" controls></video>
        `;
        galleryGrid.appendChild(div);
    });
    
    galleryModal.style.display = 'flex';
}

function closeGallery() {
    galleryModal.style.display = 'none';
}

// ==================== أزرار إعادة اللقطة والبطيء في وضع التصوير ====================
document.getElementById('replayLiveBtn').addEventListener('click', () => {
    // يمكنك تطويره لاحقاً (مثلاً إعادة تشغيل آخر فيديو)
    if (recordedVideos.length > 0) {
        const last = recordedVideos[recordedVideos.length - 1];
        const tempVideo = document.createElement('video');
        tempVideo.src = last.url;
        tempVideo.play();
        alert("جاري إعادة تشغيل آخر لقطة...");
    }
});

function setSlowMotion(rate) {
    if (liveVideo.srcObject) liveVideo.playbackRate = rate;
}

// ==================== الكود القديم (رفع الفيديو) ====================
const v = document.getElementById('m5Video');
document.getElementById('vUpload').addEventListener('change', e => {
    if (e.target.files[0]) v.src = URL.createObjectURL(e.target.files[0]);
});

// يمكنك نسخ باقي كود الـ Replay القديم هنا إذا أردت (toggleLoop إلخ)

// بدء التطبيق
window.onload = () => {
    switchTab(1); // يبدأ بصفحة الرفع
};
</script>

</body>
</html>
